name: Opengrep

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: opengrep-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: OpenGrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OPENGREP_VERSION: v1.25.0
      OPENGREP_ASSET: opengrep_manylinux_x86
      OPENGREP_SHA256: 9ac4aebb47ba3f7b0d8fc641ac8749cb6c2f253f616131a67d9631e00d4bea33

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install OpenGrep
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          url="https://github.com/opengrep/opengrep/releases/download/${OPENGREP_VERSION}/${OPENGREP_ASSET}"

          curl --fail --show-error --location --output "${tmp}/opengrep" "${url}"
          echo "${OPENGREP_SHA256}  ${tmp}/opengrep" | sha256sum -c -

          mkdir -p "$HOME/.local/bin"
          install -m 0755 "${tmp}/opengrep" "$HOME/.local/bin/opengrep"
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          opengrep --version

      - name: Run OpenGrep
        run: |
          set -euo pipefail
          opengrep scan \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/cwe-top-25 \
            --config p/javascript \
            --config p/typescript \
            --config p/nodejs \
            --config p/secrets \
            --error \
            --timeout 120 \
            --max-target-bytes 1500000 \
            --exclude node_modules \
            --exclude out \
            --exclude dist \
            --exclude coverage \
            --exclude media/webview/assets \
            .
